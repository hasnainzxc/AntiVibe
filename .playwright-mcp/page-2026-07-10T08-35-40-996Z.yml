    - main [ref=f2e21]:
      - generic [ref=f2e26]:
        - heading [level=1] [ref=f2e27]:
          - text: Build fast. Run any code
          - emphasis [ref=f2e28]: fearlessly.
        - paragraph [ref=f2e32]: The platform for devs who just want to ship. Powered by sandboxes that let you deploy any code with confidence.
        - link [ref=f2e33] [cursor=pointer]:
          - /url: /app/sign-up
      - generic [ref=f2e43]:
        - heading "Modern Compute Without the Complexity" [level=2] [ref=f2e44]
        - paragraph [ref=f2e45]: For builders who need compute that keeps up with their ideas, Fly Machines are hardware-virtualized containers that launch instantly and run only when you need them. Deploy an app in minutes or run untrusted code in isolated sandboxes.
      - generic [ref=f2e50]:
        - heading "Sandboxes That Feel Like a Superpower" [level=2] [ref=f2e51]
        - paragraph [ref=f2e52]: Spin up hardware-isolated sandboxes for running AI-generated code in complete safety. Every Sprite is a self-contained environment, ready for action in under a second. Checkpoint your entire environment, run anything, and restore if you break something. Pay only for actual CPU and memory consumption, down to the second.
        - link [ref=f2e53] [cursor=pointer]:
          - /url: https://sprites.dev/
      - generic [ref=f2e62]:
        - heading "Storage That Keeps Up" [level=2] [ref=f2e63]
        - paragraph [ref=f2e64]: Fast local NVMe for low-latency work, plus global, durable object storage for data that needs to stick around. Snapshot environments, persist state, and scale storage right alongside your sandboxes.
      - generic [ref=f2e67]:
        - heading "Built-In Private Networking" [level=2] [ref=f2e68]
        - paragraph [ref=f2e69]: Private networks per sandbox, granular routing, and end-to-end encryption — all automatic.
      - list [ref=f2e74]:
        - listitem [ref=f2e75]:
          - generic [ref=f2e77]:
            - heading "VMs That Do Everything You Need" [level=2] [ref=f2e78]
            - paragraph [ref=f2e79]: "Everything runs on Machines: your apps, agents that scale to millions of users, and AI-generated code."
        - listitem [ref=f2e80]:
          - generic [ref=f2e82]:
            - heading "Fork Off VMs Like They're Processes" [level=2] [ref=f2e83]
            - paragraph [ref=f2e84]: Fly Machines start fast enough to handle HTTP requests, run only when you need them, and scale into tens of thousands of instances.
        - listitem [ref=f2e85]:
          - generic [ref=f2e87]:
            - heading "Built for Distributed Systems" [level=2] [ref=f2e88]
            - paragraph [ref=f2e89]: Run clustered databases like Cockroach, globally-distributed Postgres, and modern RPC systems like Elixir FLAME. No Terraform required.
        - listitem [ref=f2e90]:
          - generic [ref=f2e92]:
            - heading "Get Right in Your Users' Faces" [level=2] [ref=f2e93]
            - paragraph [ref=f2e94]: Deploy in 18 regions, from Sydney to São Paulo. Sub-100ms response times give users that native-app feel, no matter where they are.
      - generic [ref=f2e97]:
