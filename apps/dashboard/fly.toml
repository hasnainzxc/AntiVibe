app = "antivibe-dashboard"
primary_region = "ams"

[build]
  builder = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"
    protocol = "http"

[env]
  SUPABASE_URL = "https://<your-project-ref>.supabase.co"
  SUPABASE_ANON_KEY = "<your-anon-key>"
  SUPABASE_SERVICE_ROLE_KEY = "<your-service-role-key>"
  NODE_ENV = "production"
