name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_CACHE_KEY: pip-${{ runner.os }}
  PNPM_CACHE_KEY: pnpm-${{ runner.os }}

jobs:
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Get pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ env.PNPM_CACHE_KEY }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.PNPM_CACHE_KEY }}-
      - run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm -r lint
      - name: Prettier
        run: pnpm exec prettier --check .
      - name: TypeScript
        run: pnpm -r --if-present typecheck

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ env.PYTHON_CACHE_KEY }}-3.12-${{ hashFiles('services/sandbox-svc/requirements.txt') }}
          restore-keys: |
            ${{ env.PYTHON_CACHE_KEY }}-3.12-
      - run: pip install ruff
      - name: Ruff check
        run: cd services/sandbox-svc && ruff check .

  test-typescript:
    name: Test TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Get pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ env.PNPM_CACHE_KEY }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.PNPM_CACHE_KEY }}-
      - run: pnpm install --frozen-lockfile
      - name: Vitest
        run: pnpm -r test --passWithNoTests

  test-python:
    name: Test Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ env.PYTHON_CACHE_KEY }}-${{ matrix.python-version }}-${{ hashFiles('services/sandbox-svc/requirements.txt') }}
          restore-keys: |
            ${{ env.PYTHON_CACHE_KEY }}-${{ matrix.python-version }}-
      - run: pip install -r services/sandbox-svc/requirements.txt
      - name: Pytest
        run: cd services/sandbox-svc && python -m pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint-typescript
      - lint-python
      - test-typescript
      - test-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Get pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ env.PNPM_CACHE_KEY }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ env.PNPM_CACHE_KEY }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
