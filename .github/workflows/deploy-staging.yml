name: Deploy Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  DASHBOARD_APP: antivibe-dashboard-staging
  SANDBOX_APP: antivibe-sandbox-staging

jobs:
  deploy-dashboard:
    name: Deploy Dashboard Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy apps/dashboard --app ${{ env.DASHBOARD_APP }} --remote-only

  deploy-sandbox:
    name: Deploy Sandbox Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy services/sandbox-svc --app ${{ env.SANDBOX_APP }} --remote-only

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - deploy-dashboard
      - deploy-sandbox
    steps:
      - run: apt-get update && apt-get install -y jq
      - name: Health check — Dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DASHBOARD_APP }}.fly.dev/api/health || echo "000")
          if [ "$STATUS" != "200" ]; then echo "Dashboard health check failed: $STATUS"; exit 1; fi
      - name: Health check — Sandbox
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.SANDBOX_APP }}.fly.dev/health || echo "000")
          if [ "$STATUS" != "200" ]; then echo "Sandbox health check failed: $STATUS"; exit 1; fi
      - name: Create GitHub Deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              auto_merge: false,
              required_contexts: [],
            });
