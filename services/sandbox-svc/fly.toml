# fly.toml — Sandbox service (internal worker, no public ingress)
#
# Internal networking note:
#   Dashboard reaches sandbox via http://antivibe-sandbox.internal:8080
#   Fly DNS resolves `.internal` within the same org automatically.
#   No public [http_service] block — only [services] with internal port.

app = "antivibe-sandbox"
primary_region = "ams"

[build]
  dockerfile = "services/sandbox-svc/Dockerfile"

[services]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 8080
    handlers = ["tls"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    path = "/health"
    method = "GET"
    expected = 200
    tls_skip_verify = false
